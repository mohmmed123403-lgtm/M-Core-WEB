<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Core Pro - النسخة الرسمية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background: #0f172a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        
        .box {
            max-width: 550px;
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 45px 35px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .logo {
            width: 70px;
            height: 70px;
            background: #3b82f6;
            border-radius: 16px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 900;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 12px;
            color: #60a5fa;
        }
        
        p {
            font-size: 17px;
            color: #cbd5e1;
            margin-bottom: 30px;
            line-height: 1.8;
        }
        
        .btn {
            display: inline-block;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 16px 45px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            transition: 0.3s;
        }
        
        .btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        
        .info {
            margin-top: 25px;
            font-size: 13px;
            color: #64748b;
        }
        
        .footer {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid #334155;
            font-size: 15px;
            color: #94a3b8;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">M</div>
        
        <h1>M-Core Pro</h1>
        <p>النسخة الرسمية المعتمدة</p>
        
        <a href="https://wetransfer.com/previews/40b85af75a7e55088c929c592774fa5020260409124353/bda0d3?itemId=ee079d583c058ad998d9e07a8771cad920260409124426" 
           class="btn" 
           target="_blank">
            تحميل النسخة الآن ⬇️
        </a>
        
        <div class="info">الإصدار: Pro v1.0 | الحجم: 106 KB</div>
        
        <div class="footer">
            أهلاً بكم يا أحبائي في النسخة الرسمية بتاعتنا ❤️‍🔥<br>
            نسخة M-Core Pro متاحة الآن للتحميل المجاني
        </div>
    </div>
</body>
</html>
