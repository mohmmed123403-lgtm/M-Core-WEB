<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>M-Core Browser</title>
<style>
:root{--main:#00ff41;--bg:#000;--bar:#0a0a0a;--card:#121212;--text:#e0e0e0;--border:#222}
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:var(--bg);color:var(--text);min-height:100vh}
.browser-bar{background:var(--bar);padding:8px;display:flex;gap:8px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-btn{background:var(--card);color:var(--main);border:1px solid var(--border);width:35px;height:35px;cursor:pointer;font-size:16px;border-radius:8px}
#urlInput{flex:1;padding:0 16px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:15px;outline:0;border-radius:20px}
#goBtn{background:var(--main);color:#000;border:none;padding:0 20px;font-weight:bold;cursor:pointer;border-radius:20px}
.home-page{padding:40px 20px;max-width:800px;margin:0 auto;text-align:center}
.logo{font-size:70px;margin-bottom:20px}
.logo-text{font-size:32px;font-weight:bold;color:var(--main);text-shadow:0 0 15px var(--main);margin-bottom:30px}
.search-box{background:var(--card);border:1px solid var(--border);border-radius:30px;padding:5px 20px;display:flex;align-items:center;margin-bottom:40px}
#homeSearch{flex:1;background:transparent;border:none;color:var(--text);font-size:16px;padding:15px 10px;outline:0}
.shortcuts{display:flex;justify-content:center;gap:20px;margin-bottom:50px;flex-wrap:wrap}
.shortcut{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:15px;width:80px;cursor:pointer}
.shortcut-icon{width:40px;height:40px;background:var(--bar);border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:20px}
.shortcut-name{font-size:12px;color:#aaa}
.news-section{text-align:right}
.news-title{font-size:20px;margin-bottom:15px;color:var(--main)}
.news-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:15px;text-align:right;cursor:pointer}
.history-list{text-align:right;margin-top:30px}
.history-item{background:var(--card);border:1px solid var(--border);padding:10px;margin:5px 0;border-radius:8px;font-size:14px;cursor:pointer}
#viewFrame{width:100%;height:calc(100vh - 52px);border:none;background:#fff;display:none}
</style>
</head>
<body>
<div class="browser-bar">
<button class="nav-btn" onclick="goBack()">◀</button>
<button class="nav-btn" onclick="goForward()">▶</button>
<button class="nav-btn" onclick="goHome()">🏠</button>
<input type="text" id="urlInput" placeholder="ابحث في M-Core أو اكتب رابط" onkeydown="if(event.key==='Enter')navigate()">
<button id="goBtn" onclick="navigate()">Go</button>
</div>

<div id="homePage" class="home-page">
<div class="logo">🌐</div>
<div class="logo-text">M-Core Browser</div>
<div class="search-box">
<span>🔍</span>
<input type="text" id="homeSearch" placeholder="ابحث في M-Core أو اكتب عنوان..." onkeydown="if(event.key==='Enter')searchFromHome()">
<span>🎤</span>
</div>

<div class="shortcuts">
<div class="shortcut" onclick="quickNav('https://github.com')"><div class="shortcut-icon">💻</div><div class="shortcut-name">GitHub</div></div>
<div class="shortcut" onclick="quickNav('https://youtube.com')"><div class="shortcut-icon">▶️</div><div class="shortcut-name">YouTube</div></div>
<div class="shortcut" onclick="quickNav('https://v86.copy.sh')"><div class="shortcut-icon">💾</div><div class="shortcut-name">v86</div></div>
<div class="shortcut" onclick="quickNav('https://news.google.com')"><div class="shortcut-icon">📰</div><div class="shortcut-name">أخبار</div></div>
</div>

<div class="news-section">
<div class="news-title">آخر الأخبار من M-Core</div>
<div class="news-card" onclick="quickNav('https://techcrunch.com')">
<strong>إطلاق M-Core Browser v2.0</strong><br>
<small>أول متصفح عربي يدعم محاكاة الأنظمة</small>
</div>
<div class="news-card" onclick="quickNav('https://www.samsung.com')">
<strong>سامسونج تكشف عن Galaxy A57 5G</strong><br>
<small>بمواصفات 12/256 وأسرع معالج</small>
</div>
</div>

<div class="history-list">
<div class="news-title">سجل المواقع</div>
<div id="historyContainer"></div>
</div>
</div>

<iframe id="viewFrame"></iframe>

<script>
const PROXY_URL="https://api.myzu-geeks.com/browse";
const frame=document.getElementById("viewFrame");
const homePage=document.getElementById("homePage");
const input=document.getElementById("urlInput");
const homeSearch=document.getElementById("homeSearch");
let history=JSON.parse(localStorage.getItem('mcore_history')||'[]');

function loadHistory(){
const container=document.getElementById('historyContainer');
container.innerHTML='';
history.slice(-5).reverse().forEach(url=>{
container.innerHTML+=`<div class="history-item" onclick="quickNav('${url}')">${url}</div>`;
});
}
loadHistory();

function saveToHistory(url){
if(!history.includes(url)){
history.push(url);
localStorage.setItem('mcore_history',JSON.stringify(history));
loadHistory();
}
}

function showHome(){homePage.style.display='block';frame.style.display='none';input.value=''}
function showFrame(){homePage.style.display='none';frame.style.display='block'}
