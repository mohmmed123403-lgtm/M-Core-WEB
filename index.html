<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Core Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #0a0a0a; color: white; height: 100vh; display: flex; flex-direction: column; }
       .header { background: #1a1a1a; padding: 10px; text-align: center; font-size: 20px; font-weight: bold; border-bottom: 2px solid #333; }
       .tabs { display: flex; background: #1a1a1a; padding: 5px; gap: 5px; overflow-x: auto; }
       .tab { background: #333; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
       .tab:hover { background: #555; }
       .tab.active { background: #0070f3; }
        #browser-frame { flex: 1; width: 100%; border: none; background: white; }
       .home { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; gap: 20px; }
       .home button { background: #0070f3; border: none; color: white; padding: 15px 40px; border-radius: 10px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">👑 M-Core Browser</div>
    <div class="tabs">
        <button class="tab active" onclick="goHome()">الرئيسية</button>
        <button class="tab" onclick="openSite('https://youtube.com')">YouTube</button>
        <button class="tab" onclick="openSite('https://google.com')">Google</button>
        <button class="tab" onclick="openSite('https://tiktok.com')">TikTok</button>
        <button class="tab" onclick="openSite('https://instagram.com')">Instagram</button>
    </div>

    <div id="home-screen" class="home">
        <h1>مرحباً بك في M-Core Browser</h1>
        <button onclick="openSite('https://youtube.com')">افتح YouTube</button>
    </div>

    <iframe id="browser-frame" style="display:none;"></iframe>

    <script>
        const SERVER_URL = 'https://m-core-server.vercel.app';
        const frame = document.getElementById('browser-frame');
        const homeScreen = document.getElementById('home-screen');
        const tabs = document.querySelectorAll('.tab');

        function openSite(url) {
            homeScreen.style.display = 'none';
            frame.style.display = 'block';
            frame.src = `${SERVER_URL}/browse?url=${encodeURIComponent(url)}`;

            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }

        function goHome() {
            homeScreen.style.display = 'flex';
            frame.style.display = 'none';
            frame.src = '';
            tabs.forEach(t => t.classList.remove('active'));
            tabs[0].classList.add('active');
        }
    </script>
</body>
</html>
